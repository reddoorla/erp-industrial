<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/touch-icon.png" />
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="%sveltekit.assets%/new-favicon-32x32.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="16x16"
			href="%sveltekit.assets%/new-favicon-16x16.png"
		/>
		<!-- Warm up third-party connections (fonts, icons, embeds, images) before they're requested -->
		<link rel="preconnect" href="https://use.typekit.net" crossorigin />
		<link rel="preconnect" href="https://p.typekit.net" crossorigin />
		<link rel="preconnect" href="https://images.prismic.io" />
		<link rel="preconnect" href="https://player.vimeo.com" />
		<link rel="dns-prefetch" href="https://buildout.com" />
		<link rel="dns-prefetch" href="https://www.googletagmanager.com" />

		<!-- Non-critical scripts: defer so they don't block first paint / the LCP heading -->
		<script defer src="https://buildout.com/api.js?v8"></script>
		<script
			async
			defer
			src="https://static.cdn.prismic.io/prismic.js?new=true&repo=erp-industrial"
		></script>

		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
		<link rel="preload" as="style" href="https://use.typekit.net/noj4tji.css" />
		<link
			rel="stylesheet"
			href="https://use.typekit.net/noj4tji.css"
			media="print"
			onload="this.media = 'all'"
		/>
		<noscript>
			<link rel="stylesheet" href="https://use.typekit.net/noj4tji.css" />
		</noscript>
		<link rel="stylesheet" href="%sveltekit.assets%/fonts.css" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="mask-icon" href="%sveltekit.assets%/safari-tab.svg" color="#ffffff" />
		<meta name="msapplication-TileColor" content="#ffffff" />
		<meta name="theme-color" content="#ffffff" />
		<meta name="google-site-verification" content="YjIJ1D32doQRCwibNZ5Zy_La8tnJXyuBaFca_dLxMLY" />

		<!-- The per-page <title> is set in src/routes/+layout.svelte via <svelte:head>.
		     A static <title> here would render BEFORE %sveltekit.head% and, being the
		     document's first <title>, would win on every page — making all pages share
		     the same title. Leave the title to the layout. -->
		%sveltekit.head%

		<!-- Google tag (gtag.js) -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-6HL05TYBXY"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag() {
				dataLayer.push(arguments);
			}
			gtag('js', new Date());

			gtag('config', 'G-6HL05TYBXY');
		</script>

		<style>
			html {
				height: 100%;
				overflow: hidden;
			}
			body {
				background-color: black;
				height: 100dvh;
				overflow: hidden;
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
